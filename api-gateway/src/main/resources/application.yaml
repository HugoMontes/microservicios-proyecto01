server:
  port: 8084

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: usuario-service
              uri: lb://USUARIO-SERVICE
              predicates:
                - Path=/usuarios/**

            - id: hotel-service
              uri: lb://HOTEL-SERVICE
              predicates:
                - Path=/hoteles/**,/staffs/**

            - id: calificacion-service
              uri: lb://CALIFICACION-SERVICE
              predicates:
                - Path=/calificaciones/**

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

# Opcional: Permite mostrar logs
# NO debe usarse en produccion
logging:
  level:
    org.springframework.cloud.gateway: TRACE
    reactor.netty.http.client: DEBUG










